name: paper-build
# Compiles the TMLR paper to PDF in CI (no local LaTeX needed).

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Compile both versions (anonymous + named preprint)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            main.tex
            main-preprint.tex
          working_directory: paper
          latexmk_use_lualatex: false

      - name: Upload PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: longhaul-paper-pdf
          path: |
            paper/main.pdf
            paper/main-preprint.pdf
